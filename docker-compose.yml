services:
  brownie:
    build: .
    init: true
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - brownie-home:/home/brownie
    environment:
      TZ: ${TZ:-UTC}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

volumes:
  brownie-home:
